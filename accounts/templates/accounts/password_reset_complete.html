{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Password Updated - ACQIP</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body { font-family: "Inter", sans-serif; }
    </style>
  </head>

  <body class="h-screen overflow-hidden">
    <div
      class="absolute inset-0 bg-cover bg-center"
      style="background-image: url('{% static "images/bg-login.jpg" %}');"
    ></div>
    <div class="absolute inset-0 bg-black/50"></div>

    <div class="relative h-full flex items-center justify-center px-4">
      <div class="w-full max-w-sm bg-white rounded-2xl shadow-2xl px-6 py-7 text-center">
        <div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-full bg-green-100 text-green-600">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
          </svg>
        </div>

        <h1 class="text-2xl font-bold text-gray-800">Password Updated</h1>
        <p class="text-sm text-gray-500 mt-2">
          Your password has been changed successfully. You can now sign in with your new password.
        </p>

        <a
          href="{% url 'login' %}"
          class="mt-6 inline-block w-full bg-purple-600 hover:bg-purple-700 text-white py-2.5 rounded-lg font-medium transition"
        >
          Sign In
        </a>
      </div>
    </div>

    <footer class="absolute bottom-0 left-0 right-0 py-3 text-center text-white/80 text-sm">
      Capital University of Science and Technology<br />ACQIP System
    </footer>
  </body>
</html>
