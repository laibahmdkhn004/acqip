<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{% block title %}ACQIP{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen antialiased text-gray-800">
  <header class="bg-white border-b">
    <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="font-semibold text-lg">ACQIP</a>
      <nav class="space-x-4 text-sm">
        {% if user.is_authenticated %}
          <span class="text-gray-600">Hi, {{ user.username }}</span>
          <a href="{% url 'dashboard' %}" class="hover:underline">Dashboard</a>
          <a href="{% url 'logout' %}" class="text-red-600 hover:underline">Logout</a>
        {% else %}
          <a href="{% url 'login' %}" class="hover:underline">Login</a>
          <a href="{% url 'register' %}" class="bg-blue-600 text-white px-3 py-1 rounded hover:bg-blue-700">Register</a>
        {% endif %}
      </nav>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-10">
    {% block content %}{% endblock %}
  </main>

  <footer class="max-w-4xl mx-auto px-4 py-6 text-xs text-gray-500">
    <div class="flex justify-between">
      <div>© ACQIP</div>
      <div>Built with Django</div>
    </div>
  </footer>
</body>
</html>
