<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}ACQIP{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body class="bg-gray-50 min-h-screen antialiased text-gray-800">
    <header class="bg-white shadow-sm border-b">
      <div
        class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between"
      >
        <a href="/" class="font-bold text-xl text-gray-900">ACQIP</a>
        <nav class="space-x-6 text-sm font-medium">
          {% if user.is_authenticated %}
          <span class="text-gray-600">Welcome, {{ user.username }}</span>
          <a
            href="{% url 'dashboard' %}"
            class="text-gray-700 hover:text-blue-600 transition-colors"
            >Dashboard</a
          >
          <a
            href="{% url 'logout' %}"
            class="text-red-600 hover:text-red-700 transition-colors"
            >Logout</a
          >
          {% else %}
          <a
            href="{% url 'login' %}"
            class="text-gray-700 hover:text-blue-600 transition-colors"
            >Login</a
          >
          <a
            href="{% url 'register' %}"
            class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors"
            >Get Started</a
          >
          {% endif %}
        </nav>
      </div>
    </header>

    <main>{% block content %}{% endblock %}</main>

    <footer class="bg-white border-t mt-16">
      <div class="max-w-6xl mx-auto px-6 py-8">
        <div class="flex justify-between items-center">
          <div class="font-semibold text-gray-900">ACQIP</div>
          <div class="text-sm text-gray-500">
            Built with Django & Tailwind CSS
          </div>
        </div>
      </div>
    </footer>
  </body>
</html>
